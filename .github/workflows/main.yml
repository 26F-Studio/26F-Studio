name: 26F Studio CI

on:
  push:
    branches: [ main, ci* ]
    tags: [ v* ]
  pull_request:
    branches: [ main ]

env:
  HTML_404_URL: https://raw.githubusercontent.com/rafgraph/spa-github-pages/gh-pages/404.html
  DIST_PATH: ./dist/spa

jobs:
  build-spa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 16
          cache: 'npm'
      - name: Install packages
        run: |
          npm install
      - name: Add hack for github pages
        shell: python3 {0}
        run: |
          with open("./src/index.template.html", "r+", encoding="utf-8") as file:
            data = file.read()
            insert_pos = data.find("\n", data.find("</head>")) - 9
            data = data[:insert_pos] + "    <script type=\"text/javascript\">\n" \
                                       "      (function(l) {\n" \
                                       "        if (l.search[1] === '/' ) {\n" \
                                       "          const decoded = l.search.slice(1).split('&').map(function (s) {\n" \
                                       "            return s.replace(/~and~/g, '&')\n" \
                                       "          }).join('?');\n" \
                                       "          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);\n" \
                                       "        }\n" \
                                       "      }(window.location))\n" \
                                       "    </script>\n" + data[insert_pos:]
            file.seek(0)
            file.truncate()
            file.write(data)
      - name: Build the app for development
        run: |
          npm run "spa release"
      - name: Download and modify 404.html for github pages
        shell: python3 {0}
        run: |
          import json
          import os
          os.system("wget ${{ env.HTML_404_URL }} -O ${{ env.DIST_PATH }}/404.html")
          with open("${{ env.DIST_PATH }}/index.html", "r", encoding="utf-8") as index_html_file:
            index_html = index_html_file.read()
            index_html = index_html[index_html.find("<title"):index_html.find("<script>")]
          with open("${{ env.DIST_PATH }}/404.html", "r+", encoding="utf-8") as notfound_html_file:
            notfound_html = notfound_html_file.read()
            insert_pos = notfound_html.find("<meta")
            notfound_html = notfound_html[:insert_pos] + notfound_html[notfound_html.find("<script"):]
            notfound_html = notfound_html[:insert_pos] + index_html + notfound_html[insert_pos:]
            print(notfound_html)
            notfound_html_file.seek(0)
            notfound_html_file.truncate()
            notfound_html_file.write(notfound_html)
      - name: Deploy to GitHub Pages
        uses: crazy-max/ghaction-github-pages@v3
        env:
          GH_PAT: ${{ secrets.FINE_PAT }}
        with:
          build_dir: ${{ env.DIST_PATH }}
          fqdn: dev.studio26f.org
          keep_history: true
          repo: 26F-Studio/26F-Studio.github.io
          target_branch: main
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: 26F-Studio_SPA
          path: ${{ env.DIST_PATH }}
      - name: Deploy to Vercel
        if: startsWith(github.ref, 'refs/tags/v')
        uses: amondnet/vercel-action@v25
        with:
          scope: ${{ secrets.VERCEL_TEAM_ID }}
          vercel-args: --prod
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_TEAM_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}

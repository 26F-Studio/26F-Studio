name: 26F Studio CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-spa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install packages
        run: |
          npm install
      - name: Add hack for github pages
        shell: python3 {0}
        run: |
          with open("./src/index.template.html", "r+", encoding="utf-8") as file:
            data = file.read()
            insert_pos = data.find("\n", data.find("</head>")) - 9
            data = data[:insert_pos] + "    <script type=\"text/javascript\">\n" \
                                       "      (function(l) {\n" \
                                       "        if (l.search[1] === '/' ) {\n" \
                                       "          const decoded = l.search.slice(1).split('&').map(function (s) {\n" \
                                       "            return s.replace(/~and~/g, '&')\n" \
                                       "          }).join('?');\n" \
                                       "          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);\n" \
                                       "        }\n" \
                                       "      }(window.location))\n" \
                                       "    </script>\n" + data[insert_pos:]
            print(data)
            file.seek(0)
            file.truncate()
            file.write(data)
      - name: Build the app for development
        run: |
          npm run "spa release"
      - name: Download 404.html for github pages
        env:
          HTML_LINK: https://raw.githubusercontent.com/rafgraph/spa-github-pages/gh-pages/404.html
        run: |
          wget ${{ env.HTML_LINK }} -O dist/spa/404.html
      - name: Deploy to GitHub Pages
        uses: crazy-max/ghaction-github-pages@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          target_branch: gh-pages
          build_dir: dist/spa
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: 26F-Studio_SPA
          path: dist/spa
